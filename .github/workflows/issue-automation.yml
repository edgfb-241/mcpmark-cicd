name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  create_required_labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create required labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              // Category labels
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              // Priority labels
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'ff9f1c', description: 'High priority issue' },
              { name: 'priority-medium', color: 'ffcc00', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              // Status labels
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '1d76db', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '006b75', description: 'Issue created by first-time contributor' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                console.log(`Label "${label.name}" already exists`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Created label "${label.name}"`);
                } else {
                  console.error(`Error checking/creating label "${label.name}":`, error);
                }
              }
            }

  issue-triage:
    runs-on: ubuntu-latest
    needs: create_required_labels
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const labelsToAdd = new Set(['needs-triage']);

            // Add category labels based on title
            if (title.includes('bug')) {
              labelsToAdd.add('bug');
            }
            if (title.includes('epic')) {
              labelsToAdd.add('epic');
            }
            if (title.includes('maintenance')) {
              labelsToAdd.add('maintenance');
            }

            // Add priority labels (highest priority first)
            const priorityRules = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityLabel = 'priority-medium'; // Default
            for (const rule of priorityRules) {
              const hasKeyword = rule.keywords.some(k => title.includes(k) || body.includes(k));
              if (hasKeyword) {
                priorityLabel = rule.label;
                break;
              }
            }
            labelsToAdd.add(priorityLabel);

            // Get current labels to avoid duplicates
            const currentLabels = issue.labels.map(l => l.name);
            const newLabels = [...labelsToAdd].filter(l => !currentLabels.includes(l));

            if (newLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: newLabels
              });
              console.log(`Added triage labels: ${newLabels.join(', ')}`);
            } else {
              console.log('No new triage labels to add');
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create epic sub-issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const parentTitle = issue.title;
            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];

            // Create sub-issues
            const subIssues = [];
            for (let i = 0; i < tasks.length; i++) {
              const taskNum = i + 1;
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${taskNum}: ${tasks[i]}`;
              const subBody = `Related to #${parentNumber}\n\nThis is a subtask of the epic issue #${parentNumber}.`;

              try {
                const subIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: subTitle,
                  body: subBody,
                  labels: ['enhancement', 'needs-review']
                });
                subIssues.push(subIssue.data);
                console.log(`Created sub-issue #${subIssue.data.number}: ${subTitle}`);
              } catch (error) {
                console.error(`Error creating sub-issue ${taskNum}:`, error);
              }
            }

            // Update parent issue with task checklist
            let parentBody = issue.body || '';
            const checklist = `\n\n## Epic Tasks\n${subIssues.map(s => `- [ ] #${s.number} - ${s.title}`).join('\n')}`;
            const updatedBody = parentBody + checklist;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });
            console.log(`Updated parent issue #${parentNumber} with epic task checklist`);

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process auto-response
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const issueNum = issue.number;
            const labels = issue.labels.map(l => l.name);

            // Check if author is first-time contributor in this repo
            let isFirstTime = false;
            try {
              const authorIssues = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                creator: author,
                state: 'all',
                per_page: 2
              });
              isFirstTime = authorIssues.data.length === 1; // Only this issue exists
            } catch (error) {
              console.error('Error checking first-time contributor:', error);
            }

            // Add first-time label if needed
            if (isFirstTime && !labels.includes('first-time-contributor')) {
              await github.rest.issues.addLabels({
                owner: owner,
                repo: repo,
                issue_number: issueNum,
                labels: ['first-time-contributor']
              });
              console.log('Added first-time-contributor label');
            }

            // Generate response based on issue type
            let response = '';
            if (labels.includes('bug')) {
              response = `### Bug Report Guidelines\n\nThank you for reporting this bug! Please ensure you've provided all necessary details (steps to reproduce, expected behavior, etc.) as outlined in the bug report template.\n\nWe'll review this issue as soon as possible.`;
            } else if (labels.includes('epic')) {
              response = `### Feature Request Process\n\nThank you for submitting this epic feature request! We've created 4 sub-tasks to break down this work (see the checklist below).\n\nPlease review the sub-tasks and provide any additional details needed.`;
            } else if (labels.includes('maintenance')) {
              response = `### Maintenance Guidelines\n\nThank you for submitting this maintenance task! Please ensure you've provided details on the impact and timeline for this work.\n\nWe'll review this task to prioritize it appropriately.`;
            } else {
              response = `Thank you for submitting this issue! We'll review it as soon as possible.`;
            }

            // Add welcome message for first-time contributors
            if (isFirstTime) {
              response = `Welcome to the ${repo} repository, @${author}! This is your first issue here—thank you for contributing!\n\n${response}`;
            }

            // Post response comment
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issueNum,
              body: response
            });
            console.log('Posted auto-response comment');

            // Set milestone for high/critical priority
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              try {
                // Check if milestone exists
                const milestones = await github.rest.issues.listMilestones({
                  owner: owner,
                  repo: repo,
                  state: 'all'
                });
                let milestone = milestones.data.find(m => m.title === 'v1.0.0');

                // Create milestone if missing
                if (!milestone) {
                  milestone = await github.rest.issues.createMilestone({
                    owner: owner,
                    repo: repo,
                    title: 'v1.0.0',
                    description: 'Milestone for version 1.0.0'
                  });
                  console.log('Created milestone v1.0.0');
                }

                // Assign milestone
                await github.rest.issues.update({
                  owner: owner,
                  repo: repo,
                  issue_number: issueNum,
                  milestone: milestone.data?.number || milestone.number
                });
                console.log(`Assigned milestone v1.0.0 to issue #${issueNum}`);
              } catch (error) {
                console.error('Error setting milestone:', error);
              }
            }

            // Update status label from needs-triage to needs-review
            if (labels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: owner,
                repo: repo,
                issue_number: issueNum,
                name: 'needs-triage'
              });
              await github.rest.issues.addLabels({
                owner: owner,
                repo: repo,
                issue_number: issueNum,
                labels: ['needs-review']
              });
              console.log('Updated status label to needs-review');
            }